name: Daily Horoscope Scraper

on:
  schedule:
    # This runs the script every single day at 8:00 AM UTC (1:00 PM WIB / 3:00 AM EST)
    - cron: '0 8 * * *'
  workflow_dispatch: # Allows you to manually trigger the script whenever you want

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    
    # 1. Download the code from the repository into the runner environment
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Set up a clean Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. Install the required scraping libraries
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    # 4. Run your scraper script to generate/update the CSV file
    - name: Run scraper script
      run: python scraper.py

    # 5. Save the updated CSV file back into your GitHub repository
    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add horoscope_matches.csv
        git commit -m "Automated update: Added today's matches" || echo "No changes to commit"
        git push
