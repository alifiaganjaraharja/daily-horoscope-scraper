name: Daily Horoscope Scraper

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:

# 🔑 FIX: This gives the GitHub Action permission to write the CSV file back to your repo
permissions:
  contents: write

jobs:
  scrape_and_commit:
    runs-on: ubuntu-latest
    steps:
    
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests beautifulsoup4

    - name: Run scraper script
      run: python scraper.py

    - name: Commit and push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "actions@github.com"
        git add horoscope_matches.csv
        git commit -m "Automated update: Added today's matches" || echo "No changes to commit"
        git push
